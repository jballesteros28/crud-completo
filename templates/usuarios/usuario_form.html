{% extends "base.html" %}
{% load static %}

{% block titulo %}Formulario de usuario{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/usuarios.css' %}">
{% endblock %}

{% block contenido %}
<section class="form-section">
  <div class="glass-card form-card">
    <span class="module-badge">Usuarios</span>
    <h1 class="module-title form-title">Cargar usuario</h1>
    <p class="module-text">Completa los datos para registrar o editar un usuario.</p>

    <form method="post" class="custom-form">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="form-actions">
        <input type="submit" value="Guardar usuario" class="btn btn-light btn-lg rounded-4">
        <a href="{% url 'usuarios' %}" class="btn btn-light btn-lg rounded-4">Volver</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
